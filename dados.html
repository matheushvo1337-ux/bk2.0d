<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger King - Dados de Entrega</title>
    <link rel="stylesheet" href="style.css?v=30">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="app-frame">
        <main class="active screen" id="screen-cep" style="background: var(--bk-cream); min-height: 100vh; padding: 0; display: flex; flex-direction: column; align-items: center;">
            <div style="width: 100%; background: var(--bk-cream); padding: 16px 20px; display: flex; align-items: center; justify-content: center; border-bottom: 1.5px solid var(--bk-cream-dark);">
                <img src="https://www.burgerking.com.br/images/bklogos/BK-novo-logo.svg" alt="Burger King" style="height: 56px;">
            </div>
            <div style="width: 100%; max-width: 440px; padding: 20px 20px 40px; flex: 1;">
                <div style="text-align: center; margin-top: 20px; padding: 0 10px;">
                    <h2 style="font-size: 28px; font-weight: 950; color: var(--bk-brown); line-height: 1.1; margin-bottom: 10px;">Confirme seus dados</h2>
                    <p style="color: var(--bk-muted); font-weight: 700; font-size: 14px; line-height: 1.5;">Onde enviamos seu pedido?</p>
                </div>
                <div style="background: #fff; border: 1px solid var(--bk-cream-dark); border-radius: 20px; padding: 24px 20px; margin-top: 15px;">
                    <div style="margin-bottom: 18px;">
                        <label style="display: block; font-size: 11px; font-weight: 900; color: var(--bk-brown); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Nome Completo</label>
                        <input type="text" id="input-nome" placeholder="Digite seu nome" class="cep-input-v2">
                    </div>
                    <div style="margin-bottom: 18px;">
                        <label style="display: block; font-size: 11px; font-weight: 900; color: var(--bk-brown); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">CEP da Entrega</label>
                        <div id="cep-mode-input">
                            <input type="tel" id="input-cep" placeholder="00000-000" maxlength="9" class="cep-input-v2">
                            <a href="javascript:void(0)" onclick="toggleCepLookup(true)" class="cep-lookup-link"><i class="fa-solid fa-magnifying-glass"></i> Não sei meu CEP</a>
                        </div>
                        <div id="cep-mode-lookup" style="display: none;">
                            <select id="select-estado" class="cep-select-v2" onchange="loadCidades(this.value)"><option value="">Estado</option></select>
                            <select id="select-cidade" class="cep-select-v2" style="margin-top: 10px;" onchange="onCidadeSelected()"><option value="">Cidade</option></select>
                            <a href="javascript:void(0)" onclick="toggleCepLookup(false)" class="cep-lookup-link"><i class="fa-solid fa-keyboard"></i> Já sei meu CEP</a>
                        </div>
                    </div>
                    <div id="cep-extra-fields" style="display: none;">
                        <input type="text" id="input-rua" placeholder="Rua / Av." class="cep-input-v2" style="margin-bottom: 15px;">
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="input-bairro" placeholder="Bairro" class="cep-input-v2" style="flex: 1;">
                            <input type="text" id="input-cidade" placeholder="Cidade/UF" class="cep-input-v2" style="flex: 1;">
                        </div>
                        <input type="tel" id="input-num" placeholder="Número" class="cep-input-v2" style="margin-top: 15px; margin-bottom: 15px;">
                    </div>
                    <button class="btn-v7 btn-v7-primary" onclick="confirmDeliveryDados()" style="font-family: 'Lilita One', sans-serif; font-size: 20px; padding: 20px; width: 100%; border-radius: 100px;">BUSCAR RESTAURANTES</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script_v7.js?v=35"></script>
</body>
</html>
