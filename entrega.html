<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger King - Acompanhe seu Pedido</title>
    <link rel="stylesheet" href="style.css?v=42">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <style>
        body { background: #f2f2f2 !important; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .delivery-map-container { position: relative; height: 100vh; background: #e0e0e0; overflow: hidden; }
        #map-root { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
        .map-overlay { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 2; pointer-events: none; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.1) 100%); }
        
        .gps-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        .gps-dot .dot { width: 14px; height: 14px; background: #ea1d2c; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.3); position: relative; }
        .gps-dot .pulse { width: 40px; height: 40px; background: rgba(234, 29, 44, 0.4); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse-gps 2s infinite; }
        
        @keyframes pulse-gps {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        .delivery-card-overlay { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 440px; background: #fff; border-radius: 24px 24px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 10px)); z-index: 20; }
        .delivery-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .delivery-status { flex: 1; }
        .status-badge { display: inline-block; background: #dcfce7; color: #16a34a; font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 20px; margin-bottom: 8px; text-transform: uppercase; }
        .status-title { font-size: 20px; font-weight: 950; color: #3e3e3e; margin: 0; line-height: 1.2; }
        .eta-box { text-align: right; }
        .eta-label { font-size: 11px; color: #717171; font-weight: 700; display: block; }
        .eta-time { font-size: 22px; font-weight: 950; color: #ea1d2c; }

        .progress-stepper { display: flex; gap: 8px; margin-bottom: 25px; }
        .step { flex: 1; height: 6px; background: #e5e7eb; border-radius: 4px; position: relative; overflow: hidden; }
        .step.filled::after { content: ''; position: absolute; top:0; left:0; width: 100%; height: 100%; background: #16a34a; animation: fill-step 0.5s ease forwards; }
        @keyframes fill-step { 0% { width: 0; } 100% { width: 100%; } }

        .delivery-details { border-top: 1px solid #f3f4f6; padding-top: 15px; }
        .detail-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
        .detail-icon { width: 40px; height: 40px; background: #f9fafb; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #ea1d2c; font-size: 18px; }
        .detail-info { flex: 1; }
        .detail-main { font-size: 14px; font-weight: 800; color: #3e3e3e; display: block; }
        .detail-sub { font-size: 12px; font-weight: 600; color: #717171; }
        
        #btn-chat-motoboy { width: 100%; background: #f3f4f6; color: #3e3e3e; font-weight: 950; padding: 14px; border-radius: 16px; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; border: 1.5px solid #e5e7eb; }
        
        @keyframes motor-move {
            0% { top: 40%; left: 45%; }
            50% { top: 38%; left: 48%; }
            100% { top: 41%; left: 52%; }
        }
        .moving { animation: motor-move 30s linear infinite; }

        /* Fake Push Notification */
        .fake-push {
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px;
            background: #fff; border-radius: 16px;
            padding: 14px 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            z-index: 9999;
            display: flex; align-items: center; gap: 12px;
            transition: top 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .fake-push.visible { top: 16px; }
        .fake-push-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: #ea1d2c; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .fake-push-icon img { width: 24px; height: 24px; }
        .fake-push-text { flex: 1; }
        .fake-push-text .app-name { font-size: 11px; color: #717171; font-weight: 700; }
        .fake-push-text .push-msg { font-size: 13px; color: #3e3e3e; font-weight: 700; margin-top: 2px; }

        /* Copy Toast */
        .copy-toast {
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: #3e3e3e; color: #fff;
            padding: 12px 24px; border-radius: 12px;
            font-weight: 700; font-size: 13px;
            z-index: 9999;
            transition: bottom 0.3s ease;
        }
        .copy-toast.visible { bottom: 30px; }
    </style>
</head>
<body>
    <div class="app-frame" style="padding: 0;">
        <div class="delivery-map-container">
            <div id="map-root"></div>
            <div class="map-overlay"></div>
            
            <div class="delivery-card-overlay">
                <div class="delivery-header">
                    <div class="delivery-status">
                        <span class="status-badge" id="status-badge">Confirmado</span>
                        <h2 class="status-title" id="ifood-status-title">Preparando seu pedido...</h2>
                    </div>
                    <div class="eta-box">
                        <span class="eta-label">Chegada em</span>
                        <span class="eta-time" id="ifood-eta-time">35-45<small style="font-size: 12px;"> min</small></span>
                    </div>
                </div>

                <div class="progress-stepper">
                    <div class="step filled" id="ifp-1"></div>
                    <div class="step" id="ifp-2"></div>
                    <div class="step" id="ifp-3"></div>
                    <div class="step" id="ifp-4"></div>
                </div>

                <div class="delivery-details">
                    <div class="detail-row">
                        <div class="detail-icon"><i class="fa-solid fa-location-dot"></i></div>
                        <div class="detail-info">
                            <span class="detail-main" id="ifood-street-number">Carregando endereço...</span>
                            <span class="detail-sub" id="ifood-neighborhood-city">...</span>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-icon"><i class="fa-solid fa-store"></i></div>
                        <div class="detail-info">
                            <span class="detail-main" id="ifood-merchant-name">Burger King</span>
                            <span class="detail-sub" id="ifood-order-info">Pedido Nº ... • 3 itens</span>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-icon"><i class="fa-brands fa-pix"></i></div>
                        <div class="detail-info">
                            <span class="detail-main">Pagamento confirmado</span>
                            <span class="detail-sub" id="ifood-payment-value">Total R$ 22,90</span>
                        </div>
                    </div>
                </div>

                <button id="btn-chat-motoboy">
                    <i class="fa-regular fa-comment-dots"></i> Converse com o entregador
                </button>
            </div>
        </div>
    </div>

    <!-- Fake Push Notification -->
    <div id="fake-push" class="fake-push">
        <div class="fake-push-icon">
            <img src="https://www.burgerking.com.br/images/bklogos/BK-novo-logo.svg" alt="BK">
        </div>
        <div class="fake-push-text">
            <div class="app-name">Burger King</div>
            <div class="push-msg">Seu pedido foi confirmado! 🎉 Prepare-se!</div>
        </div>
    </div>

    <!-- Copy Toast -->
    <div id="copy-toast" class="copy-toast">
        <i class="fa-solid fa-check-circle"></i> Copiado!
    </div>

    <!-- Hidden iframe for map (used by finalizeOrderTransition) -->
    <iframe id="tracking-map-iframe" src="" style="display:none;" frameborder="0"></iframe>

    <!-- Sound -->
    <audio id="push-sound" src="https://www.myinstants.com/media/sounds/push-ifood.mp3"></audio>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script_v7.js?v=44" defer></script>
    <script src="delivery_engine.js?v=2" defer></script>
</body>
</html>
