<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://scripts.utmify.com.br/utms/v1/auth/zVPcouPcZTmKYsS1wLc68nPwsULqzSkAZ5ks/utms.js" async defer></script>
    <title>Burger King - Seu Cupom!</title>
    <link rel="icon" href="logo_5_anos_transparent.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=29">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-frame" style="height: 100vh; overflow: hidden; display: flex; flex-direction: column;">
        <main class="active screen" id="screen-coupon" style="background: #FDF8F2; height: 100%; display: flex; flex-direction: column; padding: 0;">
            <div class="coupon-top-bar" style="flex-shrink: 0;"><span>Cupom Ativo</span></div>
            
            <div class="coupon-content-scroll" style="flex: 1; overflow-y: auto; padding-bottom: 120px; width: 100%;">
                <div class="premium-coupon-modal" style="box-shadow: none; border-radius: 0; max-width: 100%;">
                    <div class="coupon-hero-wrapper"><img src="hero_combo.png" alt="Combo" class="coupon-hero-img"></div>
                    <div class="coupon-info-section">
                        <div class="coupon-offer-name">Combo Celebração 5 Anos</div>
                        <div class="coupon-offer-items">2 Whoppers + 1 Batata G + 1 Refri 500ml</div>
                        <div class="coupon-alert-box success">
                            <div class="coupon-alert-icon success"><i class="fa-solid fa-circle-check"></i></div>
                            <div class="coupon-alert-text">Este cupom agora é seu!<br><span id="coupon-validity-text">Válido até hoje</span></div>
                        </div>
                    </div>
                    <div class="coupon-code-area">
                        <span class="coupon-code-label">Código do cupom</span>
                        <div class="coupon-dashed-box"><span class="coupon-final-value" id="coupon-final-code">XX XX X</span></div>
                        <div class="coupon-aux-label">Código auxiliar</div>
                        <div class="coupon-aux-val" id="coupon-aux-val">7RDRJ9</div>
                    </div>
                </div>
                
                <div style="padding: 20px; text-align: center; font-size: 13px; color: #777;">
                    Apresente este código no caixa ou valide no delivery para garantir o desconto exclusivo de aniversário.
                </div>
            </div>

            <div class="coupon-fixed-cta-bar" style="position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; border-top: 1px solid #eee;">
                <button class="btn-v7 btn-v7-primary coupon-footer-btn pulse-glow" style="width: 100%; margin: 0; height: 54px; font-size: 16px;" onclick="window.location.href='funil.html'">APROVEITAR OFERTA AGORA</button>
            </div>
        </main>
    </div>
    <script src="script_v7.js?v=35"></script>
</body>
</html>
