<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      window.pixelId = "699780ab85db3f519c78e463";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
    <title>Burger King - Seu Cupom!</title>
    <link rel="icon" href="logo_5_anos_transparent.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=40">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #F5EBDC;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }
        .app-container-v7 {
            width: 100%;
            max-width: 440px;
            background: #FDF8F2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(80,35,20,0.1);
            overflow: hidden;
        }
        .bk-app-header {
            background: #502314;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            border-bottom: 3px solid #D62300;
            flex-shrink: 0;
            z-index: 100;
        }
        .bk-header-title {
            color: #fff;
            font-family: 'Lilita One', sans-serif;
            font-size: 20px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 120px; /* Espaço para o botão fixo */
        }
        .hero-banner {
            width: 100%;
            line-height: 0;
            position: relative;
        }
        .hero-banner img {
            width: 100%;
            display: block;
        }
        .offer-details {
            padding: 24px 20px;
            text-align: center;
        }
        .offer-title {
            font-family: 'Lilita One', sans-serif;
            font-size: 30px;
            color: #502314;
            margin: 0 0 6px 0;
            line-height: 1.1;
        }
        .offer-subtitle {
            font-weight: 700;
            color: #8A7060;
            font-size: 15px;
            margin-bottom: 24px;
        }
        .status-badge-v2 {
            background: #EAF7ED;
            border: 1px solid #D1EAD8;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            text-align: left;
        }
        .status-icon {
            width: 28px;
            height: 28px;
            background: #16A34A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            flex-shrink: 0;
        }
        .coupon-box-v2 {
            background: #fff;
            border: 2px dashed #D3C6B9;
            border-radius: 20px;
            padding: 24px 15px;
            margin-top: 10px;
            position: relative;
        }
        .coupon-label-v2 {
            font-weight: 950;
            font-size: 11px;
            color: #B9ABA0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: block;
        }
        .coupon-main-code {
            font-family: 'Lilita One', sans-serif;
            font-size: 44px;
            color: #502314;
            display: block;
            margin: 5px 0;
        }
        .btn-sticky-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            padding: 20px;
            box-sizing: border-box;
            border-top: 1px solid #F2EDE1;
            z-index: 200;
        }
        .bk-btn-primary {
            width: 100%;
            height: 60px;
            background: #D62300;
            border: none;
            border-radius: 100px;
            color: #fff;
            font-family: 'Lilita One', sans-serif;
            font-size: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(214,35,0,0.3);
            transition: transform 0.2s, background 0.2s;
        }
        .bk-btn-primary:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="app-container-v7">
        <!-- HEADER OFICIAL -->
        <header class="bk-app-header">
            <div class="bk-header-title">
                <i class="fa-solid fa-crown" style="color: #FFC72C; font-size: 16px;"></i>
                Cupom Ativo
            </div>
        </header>

        <div class="scrollable-content">
            <!-- BANNER HERO -->
            <div class="hero-banner">
                <img src="hero_combo.png" alt="Oferta">
            </div>

            <!-- CONTEUDO DA OFERTA -->
            <div class="offer-details">
                <h1 class="offer-title">Combo Celebração 5 Anos</h1>
                <p class="offer-subtitle">2 Whoppers + 1 Batata G + 1 Refri 500ml</p>

                <div class="status-badge-v2">
                    <div class="status-icon"><i class="fa-solid fa-check"></i></div>
                    <div>
                        <div style="font-weight: 800; color: #502314; font-size: 14px;">Resgate confirmado!</div>
                        <div id="coupon-validity-text" style="color: #16A34A; font-size: 12px; font-weight: 700;">Válido até 23/03 ÀS 23h59</div>
                    </div>
                </div>

                <div class="coupon-box-v2">
                    <span class="coupon-label-v2">Código do Cupom</span>
                    <span id="coupon-final-code" class="coupon-main-code">XX XX X</span>
                    <div style="color: #B9ABA0; font-size: 12px; font-weight: 700; margin-top: 10px;">
                        Válido exclusivamente para Delivery no App
                    </div>
                </div>

                <div style="margin-top: 30px; text-align: left; padding: 0 5px;">
                    <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 15px;">
                        <i class="fa-solid fa-circle-info" style="color: #B9ABA0; margin-top: 3px;"></i>
                        <p style="margin: 0; font-size: 12px; color: #8A7060; font-weight: 600; line-height: 1.4;">
                            Este cupom é válido exclusivamente para Delivery e expira em breve. Aproveite enquanto há tempo!
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTÃO FIXO PREMIUM -->
        <div class="btn-sticky-container">
            <button class="bk-btn-primary pulse-glow" onclick="window.location.href='dados.html'">
                APROVEITAR OFERTA AGORA
            </button>
        </div>
    </div>

    <script src="script_v7.js?v=44" defer></script>
    <script>
        // ??? GUARD: Se não girou a roleta, volta pra roleta
        (function() {
            const savedCoupon = localStorage.getItem('bk_funil_coupon_v2');
            if (!savedCoupon) {
                window.location.replace('index.html');
                return;
            }
        })();

        document.addEventListener('DOMContentLoaded', () => {
            const savedCoupon = localStorage.getItem('bk_funil_coupon_v2');
            
            // Se por algum motivo o guard acima não redirecionou, gera o cupom
            const couponCode = savedCoupon || (typeof getOrGenerateCoupon === 'function' ? getOrGenerateCoupon() : generateLocalCoupon());
            
            const codeEl = document.getElementById('coupon-final-code');
            if(codeEl) codeEl.textContent = couponCode;

            // Gera validade dinâmica (1 hora à frente)
            const d = new Date();
            d.setHours(d.getHours() + 1);
            const pad = (n) => String(n).padStart(2, '0');
            const vStr = `Válido até hoje ÀS ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            const validEl = document.getElementById('coupon-validity-text');
            if(validEl) validEl.textContent = vStr;
        });

        // Fallback local caso o script principal não carregue
        function generateLocalCoupon() {
            const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
            const numbers = '23456789';
            const getL = () => letters.charAt(Math.floor(Math.random() * letters.length));
            const getN = () => numbers.charAt(Math.floor(Math.random() * numbers.length));
            const code = `${getL()}${getN()} ${getL()}${getN()} ${getL()}`;
            localStorage.setItem('bk_funil_coupon_v2', code);
            return code;
        }
    </script>
</body>
</html>
