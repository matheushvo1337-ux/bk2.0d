<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger King - Pagamento PIX</title>
    <link rel="stylesheet" href="style.css?v=29">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #F5EBDC;">
    <div class="app-frame">
        <section class="active screen" id="screen-pix">
            <div style="text-align: center; margin-top: 30px;">
                <h2 style="font-size: 24px; font-weight: 950; color: var(--bk-brown);">Pagamento via PIX</h2>
                <p style="font-weight: 700; color: #666; font-size: 14px; margin-top: 5px;">Escaneie o QR Code ou copie o código</p>
            </div>
            <div class="pix-card">
                <div class="pix-qr-container" id="pix-qr"></div>
                <div class="pix-timer-bar">
                    <i class="fa-solid fa-clock" style="color: var(--bk-red);"></i>
                    <span>Pague em até: <strong id="pix-timer">04:59</strong></span>
                </div>
                <div class="pix-total">
                    <span>Total:</span>
                    <span style="font-weight: 950; font-size: 24px; color: var(--bk-brown);">R$ <span id="pix-total-value">22,90</span></span>
                </div>
                <div class="pix-code-box">
                    <p style="font-size: 11px; font-weight: 800; color: #717171; text-transform: uppercase;">Código PIX Copia e Cola</p>
                    <div class="pix-code-row">
                        <div class="pix-code-text" id="pix-code">Gerando código...</div>
                        <button class="pix-copy-btn" onclick="copyPixCode()"><i class="fa-solid fa-copy"></i></button>
                    </div>
                </div>
            </div>

            <div style="padding: 20px 16px;">
                <button class="btn-finalizar-full" onclick="simulatePayment()" id="btn-confirm-pix" style="justify-content: center; display: none;">
                    <span>Já fiz o pagamento</span>
                </button>
            </div>

            <div style="background: #fff; border-radius: 20px; padding: 20px; margin: 20px 16px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-card);">
                <i class="fa-solid fa-circle-check" style="color: #32bcad; font-size: 24px;"></i>
                <p style="font-size: 13px; font-weight: 700; color: #717171;">Após o pagamento, o seu pedido será enviado automaticamente para a cozinha.</p>
            </div>
        </section>
    </div>
    <script src="script_v7.js?v=35"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
</html>
